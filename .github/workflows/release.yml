name: Build macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App
        timeout-minutes: 60
        run: pnpm tauri build --target universal-apple-darwin

      - name: Prepare macOS Assets
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"

          # .app → zip
          APP_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/CC-Switch-${VERSION}-macOS.zip"
            echo "macOS zip ready"
          fi

          # .tar.gz (updater)
          TAR_GZ=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.tar.gz" -type f | head -1)
          if [ -n "$TAR_GZ" ]; then
            cp "$TAR_GZ" "release-assets/CC-Switch-${VERSION}-macOS.tar.gz"
            [ -f "$TAR_GZ.sig" ] && cp "$TAR_GZ.sig" "release-assets/CC-Switch-${VERSION}-macOS.tar.gz.sig"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: CC-Switch-macOS
          path: release-assets/*
          if-no-files-found: error
